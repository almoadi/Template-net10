name: template-net10

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      # Env vars override config/*.json (Section__Key). Change secrets before any real deployment.
      Database__ConnectionString: "Server=sqlserver,1433;Database=Template_net10;User Id=sa;Password=Your_strong!Passw0rd;TrustServerCertificate=true;Encrypt=false;MultipleActiveResultSets=true;"
      Jwt__SecretKey: "docker-dev-only-change-me-please-with-at-least-32-bytes"
      Encryption__Key: "docker-dev-only-encryption-key-change-me"

volumes:
  mssql-data:
